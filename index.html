<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immersive AR Business Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Space+Grotesk:wght@500&display=swap');

    :root {
      --cyan-glow: rgba(34, 211, 238, 0.8);
      --bg-dark: #0f1115;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg-dark);
      /* A subtle background grid for the whole page */
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
      perspective: 1000px;
    }

    /* Ambient light behind the card */
    .ambient-light {
      position: absolute;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(121, 203, 226, 0.15) 0%, transparent 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* The Main Card Container */
    .card {
      position: relative;
      width: 600px;
      height: 320px;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      border-radius: 20px;
      /* Gradient matching the uploaded image */
      background: linear-gradient(145deg, #a4d8e5 0%, #5cb3cd 40%, #000000 80%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.8),
        0 0 30px rgba(164, 216, 229, 0.2) inset;
      cursor: crosshair;
    }

    /* Circuit Board Pattern Overlay on the bottom right */
    .card::before {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 40%;
      border-bottom-right-radius: 20px;
      border-bottom-left-radius: 20px;
      /* Simulated circuit lines */
      background-image: 
        radial-gradient(circle at 70% 50%, rgba(255,255,255,0.1) 2px, transparent 3px),
        linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.05) 49%, rgba(255,255,255,0.05) 51%, transparent 52%);
      background-size: 30px 30px;
      opacity: 0.8;
      pointer-events: none;
    }

    /* Outer Glow Border for the Card */
    .card::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      background: linear-gradient(to bottom right, rgba(255,255,255,0.8), transparent, rgba(34, 211, 238, 0.5));
      z-index: -1;
      filter: blur(4px);
      opacity: 0.5;
    }

    /* Internal Layout */
    .card-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 30px;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    /* Photo Frame with glowing border */
    .photo-container {
      width: 200px;
      height: 250px;
      border-radius: 24px;
      border: 3px solid #8fe0f0;
      box-shadow: 0 0 20px var(--cyan-glow);
      transform: translateZ(40px); /* Pops out in 3D */
      position: relative;
      overflow: hidden;
    }

    /* Simulated shine effect on the photo */
    .photo-container::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      animation: shine 6s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    /* Text Information */
    .info-container {
      margin-left: 30px;
      color: #000;
      transform: translateZ(30px);
      flex: 1;
    }

    .role {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 15px;
      color: #1a1a1a;
    }

    .name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 25px;
      color: #000;
      text-shadow: 0 2px 10px rgba(255,255,255,0.5);
    }

    .contact-item {
      display: flex;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #000;
      /* Changes color slightly based on the dark background behind it */
      mix-blend-mode: overlay; 
    }

    .contact-item svg {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      fill: #000;
    }

    /* The overlapping QR Code */
    .qr-container {
      position: absolute;
     .qr-container {
      position: absolute;
      right: -30px; 
      bottom: 20px; /* Anchors it down to the bottom corner out of the way */
      width: 160px;
      height: 160px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateZ(60px); 
      pointer-events: auto; 
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden; /* STRICT FIX: Prevents the image from spilling out */
    }

    .qr-container:hover {
      transform: translateZ(80px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px var(--cyan-glow);
    }

   .qr-label {
      font-size: 11px;
      font-weight: 800;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px; 
      margin-top: 10px;
      z-index: 2;
    }

    .qr-container img {
      width: 105px !important;  /* !important forces the browser to obey this size */
      height: 105px !important;
      object-fit: contain; 
      z-index: 1;
    }

  </style>
</head>
<body>

  <div class="ambient-light"></div>

  <div class="scene">
    <div class="card" id="interactiveCard">
      <div class="card-content">
        
        <div class="photo-container" style="background-image: url('./Anni CV pHoto.jpeg'); background-position: center; background-size: cover; background-repeat: no-repeat;"></div>
        
        <div class="info-container">
          <div class="role">XR Developer</div>
          <div class="name">Anni Atawani</div>
          
          <div class="contact-item" style="color: #fff; mix-blend-mode: normal;">
            <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57a1.02 1.02 0 0 0-1.02.24l-2.2 2.2a15.045 15.045 0 0 1-6.59-6.59l2.2-2.21a.96.96 0 0 0 .25-1A11.36 11.36 0 0 1 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/></svg>
            +46 764 264 761
          </div>
          <div class="contact-item" style="color: #fff; mix-blend-mode: normal; text-shadow: 0 0 5px rgba(0,0,0,0.5);">
            <svg fill="#fff" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            anni@atawani.com
          </div>
        </div>

        <div class="qr-container" onclick="window.open('https://www.kivicube.com/scenes/eZ8fq0SjKR0pX0QKwwlSe1dbMG5EjTGr', '_blank')">
          <div class="a.png">Scan Me</div>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.kivicube.com/scenes/eZ8fq0SjKR0pX0QKwwlSe1dbMG5EjTGr" alt="QR Code to Kivicube Scene"> </div>
      
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('interactiveCard');
    const scene = document.querySelector('.scene');

    // Calculate rotation based on mouse position
    scene.addEventListener('mousemove', (e) => {
      // Find center of screen
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      // Calculate distance from center (divided by a factor to reduce sensitivity)
      const rotateX = ((centerY - e.clientY) / 20).toFixed(2);
      const rotateY = ((e.clientX - centerX) / 20).toFixed(2);

      // Apply the rotation using CSS transforms
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    // Reset position smoothly when mouse leaves
    scene.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
      card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
      
      // Remove transition so it feels responsive when mouse re-enters immediately
      setTimeout(() => {
        card.style.transition = 'transform 0.1s ease-out';
      }, 600);
    });
  </script>

</body>
</html>
